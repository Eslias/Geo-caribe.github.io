<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geo Caribe — Costa Rica</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #1a4a2e;
      --verde-med: #2d6a44;
      --verde-claro: #4a9463;
      --hoja: #6ab87a;
      --crema: #f5f0e8;
      --crema-oscura: #ede5d8;
      --tierra: #8b5e3c;
      --dorado: #c9912a;
      --coral: #d45a3a;
      --texto: #1c1c1c;
      --muted: #6b6b6b;
      --bg-panel: #faf8f4;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--crema); }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      height: 56px;
      background: var(--verde);
      display: flex; align-items: center; padding: 0 20px; gap: 14px;
      border-bottom: 2px solid var(--verde-claro);
    }
    #header-logo { width: 36px; height: 36px; flex-shrink: 0; }
    #header-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 600;
      color: var(--crema); letter-spacing: 0.02em; line-height: 1.1;
    }
    #header-title span {
      display: block; font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 300; color: var(--hoja);
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    #header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #btn-inicio {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px; color: var(--crema); font-size: 12px;
      font-family: 'DM Sans', sans-serif; padding: 5px 14px; cursor: pointer;
      letter-spacing: 0.04em; transition: background 0.2s;
    }
    #btn-inicio:hover { background: rgba(255,255,255,0.2); }
    #map-wrap { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }
    #map { width: 100%; height: 100%; }

    /* ── SIDE PANEL ── */
    #side-panel {
      position: absolute; top: 0; right: -420px; width: 400px; height: 100%;
      background: var(--bg-panel); border-left: 1px solid var(--crema-oscura);
      transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 1000; display: flex; flex-direction: column; overflow: hidden;
    }
    #side-panel.open { right: 0; }

    /* ── IMAGE GALLERY ── */
    #panel-img-wrap {
      width: 100%; height: 200px; flex-shrink: 0; position: relative;
      overflow: hidden; background: var(--verde-med);
    }
    .gallery-slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s;
    }
    .gallery-slide img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .gallery-slide.hidden { opacity: 0; pointer-events: none; }
    #panel-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; font-size: 64px;
      z-index: 2;
    }
    #panel-img-wrap::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
      background: linear-gradient(transparent, var(--bg-panel)); pointer-events: none; z-index: 3;
    }
    /* Gallery nav arrows */
    .gallery-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 10; background: rgba(0,0,0,0.45); border: none;
      border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
      color: white; font-size: 16px; display: flex; align-items: center;
      justify-content: center; transition: background 0.2s;
      line-height: 1;
    }
    .gallery-arrow:hover { background: rgba(0,0,0,0.7); }
    #gallery-prev { left: 10px; }
    #gallery-next { right: 10px; }
    .gallery-arrow.hidden { display: none; }
    /* Dots */
    #gallery-dots {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 5px;
    }
    .gdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.5); border: none; padding: 0; cursor: pointer;
      transition: background 0.2s;
    }
    .gdot.active { background: white; }

    #panel-close {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      background: rgba(0,0,0,0.45); border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer; color: white;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
    }
    #panel-close:hover { background: rgba(0,0,0,0.65); }

    #panel-body { padding: 4px 20px 20px; overflow-y: auto; flex: 1; }
    #panel-nivel {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
    }
    .nivel-principiante { background: #e6f4ea; color: #2d6a44; }
    .nivel-intermedio    { background: #fff4e0; color: #8b5e1c; }
    .nivel-avanzado      { background: #fdecea; color: #a93226; }
    #panel-title {
      font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600;
      color: var(--texto); margin-bottom: 2px; line-height: 1.2;
    }
    #panel-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    #panel-desc { font-size: 14px; line-height: 1.7; color: var(--texto); margin-bottom: 16px; }
    .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .info-card { background: white; border: 1px solid var(--crema-oscura); border-radius: 10px; padding: 10px 12px; }
    .info-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
    .info-card-value { font-size: 13px; font-weight: 500; color: var(--texto); }
    .info-card-icon { font-size: 18px; margin-bottom: 4px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
    #panel-equipo { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .equipo-tag {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: var(--crema-oscura); color: var(--verde);
      font-weight: 500; border: 1px solid rgba(74,148,99,0.2);
    }
    #panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .ptag {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: #e8f4ec; color: var(--verde-med); border: 1px solid rgba(74,148,99,0.15);
    }
    .tucan-tooltip {
      background: white !important; border: 1px solid rgba(0,0,0,0.12) !important;
      border-radius: 8px !important; font-family: 'DM Sans', sans-serif !important;
      font-size: 13px !important; font-weight: 500 !important; padding: 5px 12px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12) !important; color: var(--verde) !important;
    }
    .tucan-tooltip::before { display: none !important; }

    /* ── LEYENDA + FILTROS ── */
    #leyenda {
      position: absolute; bottom: 20px; left: 12px; z-index: 1000;
      background: white; border: 1px solid var(--crema-oscura);
      border-radius: 12px; padding: 10px 14px; font-size: 12px;
    }
    .leyenda-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .filtro-btn {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 5px; background: none; border: none;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--texto); padding: 3px 6px;
      border-radius: 6px; width: 100%; text-align: left;
      transition: background 0.15s, opacity 0.2s;
    }
    .filtro-btn:last-child { margin-bottom: 0; }
    .filtro-btn:hover { background: var(--crema-oscura); }
    .filtro-btn.apagado { opacity: 0.35; }
    .filtro-btn .leyenda-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .filtro-btn .check-icon { margin-left: auto; font-size: 11px; color: var(--verde-med); }
    .filtro-btn.apagado .check-icon { visibility: hidden; }

    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--crema-oscura); border-radius: 4px; }
  </style>
</head>
<body>

<div id="header">
  <svg id="header-logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M8 28 C5 22, 3 14, 10 8 C12 6, 14 7, 13 10 C12 14, 9 18, 10 24 Z" fill="#4a9463" opacity="0.85"/>
    <path d="M18 28 C22 22, 26 14, 20 7 C18 5, 16 7, 17 10 C18 14, 21 18, 20 24 Z" fill="#6ab87a" opacity="0.85"/>
    <path d="M14 30 C12 24, 11 16, 14 9 C15 7, 17 7, 18 9 C21 16, 20 24, 18 30 Z" fill="#2d6a44"/>
    <line x1="16" y1="9" x2="15" y2="30" stroke="#1a4a2e" stroke-width="0.7" opacity="0.5"/>
    <path d="M10 24 C7 21, 5 18, 8 15 C9 14, 11 14, 11 16 C11 19, 10 22, 10 24 Z" fill="#4a9463" opacity="0.7"/>
    <path d="M20 24 C23 21, 25 18, 22 15 C21 14, 19 14, 19 16 C19 19, 20 22, 20 24 Z" fill="#6ab87a" opacity="0.7"/>
    <line x1="16" y1="30" x2="16" y2="33" stroke="#8b5e3c" stroke-width="1.5" stroke-linecap="round"/>
  </svg>

  <div id="header-title">
    Geo Caribe
    <span>Costa Rica · Limon</span>
  </div>
  <div id="header-right">
    <button id="btn-inicio" onclick="volverAlInicio()">↩ Inicio</button>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>

  <div id="side-panel">
    <div id="panel-img-wrap">
      <div id="panel-img-placeholder">🌿</div>
      <!-- slides inserted by JS -->
      <button class="gallery-arrow hidden" id="gallery-prev" onclick="cambiarFoto(-1)">&#8249;</button>
      <button class="gallery-arrow hidden" id="gallery-next" onclick="cambiarFoto(1)">&#8250;</button>
      <div id="gallery-dots"></div>
    </div>
    <button id="panel-close" onclick="cerrarPanel()">✕</button>
    <div id="panel-body">
      <div id="panel-nivel" class="nivel-principiante">🟢 Principiante</div>
      <p id="panel-title">Nombre</p>
      <p id="panel-subtitle">Subtítulo</p>
      <p id="panel-desc">Descripción</p>
      <div class="info-row">
        <div class="info-card">
          <div class="info-card-icon">🗓️</div>
          <div class="info-card-label">Mejor época</div>
          <div class="info-card-value" id="panel-epoca">—</div>
        </div>
        <div class="info-card">
          <div class="info-card-icon">🌿</div>
          <div class="info-card-label">Naturaleza</div>
          <div class="info-card-value" id="panel-naturaleza">—</div>
        </div>
      </div>
      <p class="section-title">Equipo recomendado</p>
      <div id="panel-equipo"></div>
      <p class="section-title">Características</p>
      <div id="panel-tags"></div>
    </div>
  </div>

  <!-- LEYENDA CON FILTROS -->
  <div id="leyenda">
    <div class="leyenda-label">Nivel</div>
    <button class="filtro-btn" id="filtro-principiante" onclick="toggleFiltro('principiante')">
      <div class="leyenda-dot" style="background:#2d9c5a"></div>
      <span>Principiante</span>
      <span class="check-icon">✓</span>
    </button>
    <button class="filtro-btn" id="filtro-intermedio" onclick="toggleFiltro('intermedio')">
      <div class="leyenda-dot" style="background:#e08c1a"></div>
      <span>Intermedio</span>
      <span class="check-icon">✓</span>
    </button>
    <button class="filtro-btn" id="filtro-avanzado" onclick="toggleFiltro('avanzado')">
      <div class="leyenda-dot" style="background:#c0392b"></div>
      <span>Avanzado</span>
      <span class="check-icon">✓</span>
    </button>
  </div>
</div>

<script>

/* =====================================================
   DATOS — agrega más URLs en el array "imgs" de cada lugar
   ===================================================== */
const lugares = [

  {
    latlng: [9.99074, -83.03596],
    nombre: "Limón Centro",
    subtitulo: "Puerto Caribe de Costa Rica",
    desc: "Puerto Limón es la capital de la provincia de Limón y el principal puerto marítimo de Costa Rica en el Caribe. Es el corazón de la cultura afrocostarricense, con festividades como el Carnaval de Limón en octubre.",
    nivel: "principiante",
    epoca: "Oct–Nov (Carnaval)",
    naturaleza: "Mar Caribe, manglares",
    equipo: ["Ropa liviana", "Zapatos cómodos", "Protector solar", "Repelente de mosquitos", "Paraguas plegable"],
    tags: ["Puerto histórico", "Cultura afrocaribe", "Carnaval", "Gastronomía"],
    imgs: [
      "https://costarica.org/wp-content/uploads/2017/09/Limon2.jpg"
    ]
  },

  {
    latlng: [9.7319895, -82.8211192],
    nombre: "Playa Cahuita",
    subtitulo: "Cahuita, Limón",
    desc: "Una de las playas más hermosas del Caribe costarricense, junto al Parque Nacional Cahuita. Sus arrecifes de coral son los más grandes del país, perfectos para snorkel entre peces tropicales.",
    nivel: "principiante",
    epoca: "Feb–Apr y Sep–Oct",
    naturaleza: "Arrecife de coral, bosque tropical",
    equipo: ["Traje de baño", "Snorkel y gafas", "Repelente biodegradable", "Sandalias acuáticas", "Protector solar reef-safe"],
    tags: ["Playa", "Snorkel", "Parque Nacional", "Peces tropicales"],
    imgs: [
      "https://descubramoscostarica.com/sites/default/files/styles/wide/public/2021-12/cahuita-1.jpg.webp?itok=ghhC7i06"
    ]
  },

  {
    latlng: [9.643367832448668, -82.68753794816715],
    nombre: "Punta Uva",
    subtitulo: "Puerto Viejo de Talamanca, Limón",
    desc: "Considerada una de las playas más vírgenes de Costa Rica. Sus aguas turquesas y la selva que llega hasta la arena crean un ambiente de película. Ideal para nadar, bucear y observar monos y perezosos.",
    nivel: "principiante",
    epoca: "Feb–Apr y Sep–Oct",
    naturaleza: "Selva tropical, aguas turquesas",
    equipo: ["Traje de baño", "Repelente de mosquitos", "Binoculares", "Cámara sumergible", "Ropa de secado rápido"],
    tags: ["Playa virgen", "Turquesa", "Avistamiento de fauna", "Buceo"],
    imgs: [
      "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQC1BIMzYFSf2hNvB8ISK2sinM_aHMcgzW35Q&s"
    ]
  },

  {
    latlng: [10.0167, -83.3167],
    nombre: "Parque Nacional Tortuguero",
    subtitulo: "Tortuguero, Limón",
    desc: "El 'Amazonas de Costa Rica'. Una intrincada red de canales selváticos donde viven monos, caimanes, manatíes y delfines. De julio a octubre llegan tortugas baulas y verdes a desovar en sus playas negras.",
    nivel: "intermedio",
    epoca: "Jul–Oct (tortugas), Mar–May (canales)",
    naturaleza: "Canales, selva lluviosa, playa negra",
    equipo: ["Botas de hule o impermeables", "Chubasquero", "Repelente DEET fuerte", "Linterna de cabeza", "Ropa de manga larga", "Binoculares"],
    tags: ["Tortugas marinas", "Canales", "Monos", "Caimanes", "Manatíes"],
    imgs: [
      "https://costarica.org/wp-content/uploads/2014/12/Tortuguero-Canal.jpg"
    ]
  },

  {
    latlng: [9.6582, -82.7524],
    nombre: "Jaguar Rescue Center",
    subtitulo: "Puerto Viejo de Talamanca",
    desc: "Centro de rescate y rehabilitación de fauna silvestre fundado por primatólogos europeos. Alberga perezosos, monos, tucanes, iguanas y serpientes en proceso de rehabilitación. Una experiencia educativa única.",
    nivel: "principiante",
    epoca: "Todo el año (abren martes–domingo)",
    naturaleza: "Fauna rescatada, selva secundaria",
    equipo: ["Ropa cómoda de colores neutros", "Zapatos cerrados", "Repelente suave", "Cámara"],
    tags: ["Perezosos", "Fauna silvestre", "Educación ambiental", "Familia"],
    imgs: [
      "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2a/df/91/6c/jrc.jpg?w=1200&h=900&s=1"
    ]
  },

  {
    latlng: [9.8736, -82.9381],
    nombre: "Río Pacuare",
    subtitulo: "Siquirres, Limón",
    desc: "Considerado uno de los mejores ríos para rafting del mundo por National Geographic. Sus rápidos de clase III y IV atraviesan un cañón con cascadas y selva virgen.",
    nivel: "avanzado",
    epoca: "Jun–Oct (caudal alto), Nov–Mar (caudal medio)",
    naturaleza: "Cañón selvático, cascadas, rapidos",
    equipo: ["Ropa deportiva que moje", "Sandalias con agarre", "Bolsa impermeable para pertenencias", "Casco y chaleco (los provee la empresa)", "Crema solar resistente al agua"],
    tags: ["Rafting clase IV", "Cañón", "Cascadas", "Aventura extrema"],
    imgs: [
      "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzlTWzPs2R1UqGwHLB960C02J2zyjmOlupNg&s"
    ]
  },

  {
    latlng: [9.5831, -82.7758],
    nombre: "Reserva Indígena Bribri",
    subtitulo: "Talamanca, Limón",
    desc: "Visita el territorio ancestral del pueblo Bribri en las faldas de la Cordillera de Talamanca. Conoce sus tradiciones, prácticas de cacao sagrado y medicina natural.",
    nivel: "intermedio",
    epoca: "Todo el año (evitar semana lluviosa May–Jun)",
    naturaleza: "Selva montañosa, ríos, cacao silvestre",
    equipo: ["Botas impermeables de caña alta", "Ropa de manga larga", "Repelente fuerte", "Cantimplora", "Impermeable liviano"],
    tags: ["Cultura indígena", "Cacao", "Ecoturismo", "Senderismo"],
    imgs: [
      "https://static.wixstatic.com/media/95f0e3_9b2876e079f94496ad93a0d56dc68672~mv2.png/v1/fill/w_658,h_428,al_c,q_85,usm_0.33_1.00_0.00,enc_avif,quality_auto/95f0e3_9b2876e079f94496ad93a0d56dc68672~mv2.png"
    ]
  }

];

/* =====================================================
   MAPA
   ===================================================== */
const map = L.map('map').setView([9.82, -82.9], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

/* ── Iconos originales con archivos .png ── */
function crearIcono(nivel) {
  const iconos = {
    principiante: {
      iconUrl: 'principiante.jpg',
      iconSize:      [40, 40],
      iconAnchor:    [20, 40],
      tooltipAnchor: [22, -20]
    },
    intermedio: {
      iconUrl: 'intermedio.png',
      iconSize:      [40, 40],
      iconAnchor:    [20, 40],
      tooltipAnchor: [22, -20]
    },
    avanzado: {
      iconUrl: 'avanzado.jpg',
      iconSize:      [40, 40],
      iconAnchor:    [20, 40],
      tooltipAnchor: [22, -20]
    }
  };
  const cfg = iconos[nivel] || iconos.principiante;
  return L.icon(cfg);
}

/* Mapa de marcadores por nivel para filtro */
const marcadoresPorNivel = { principiante: [], intermedio: [], avanzado: [] };
const filtrosActivos = { principiante: true, intermedio: true, avanzado: true };

lugares.forEach(lugar => {
  const marker = L.marker(lugar.latlng, { icon: crearIcono(lugar.nivel) }).addTo(map);
  marker.bindTooltip(`<strong>${lugar.nombre}</strong>`, {
    direction: 'right', className: 'tucan-tooltip',
    offset: [8, -21], permanent: false, sticky: false
  });
  marker.on('click', () => abrirPanel(lugar));
  marcadoresPorNivel[lugar.nivel] = marcadoresPorNivel[lugar.nivel] || [];
  marcadoresPorNivel[lugar.nivel].push(marker);
});

/* ── Filtros ── */
function toggleFiltro(nivel) {
  filtrosActivos[nivel] = !filtrosActivos[nivel];
  const btn = document.getElementById('filtro-' + nivel);
  btn.classList.toggle('apagado', !filtrosActivos[nivel]);
  (marcadoresPorNivel[nivel] || []).forEach(m => {
    if (filtrosActivos[nivel]) { m.addTo(map); } else { m.remove(); }
  });
}

/* ── Galería ── */
let fotoActual = 0;
let fotosTotal = 0;

function construirGaleria(imgs) {
  const wrap = document.getElementById('panel-img-wrap');
  // Limpiar slides anteriores
  wrap.querySelectorAll('.gallery-slide').forEach(el => el.remove());

  const placeholder = document.getElementById('panel-img-placeholder');
  const dotsEl = document.getElementById('gallery-dots');
  dotsEl.innerHTML = '';

  fotoActual = 0;
  fotosTotal = imgs ? imgs.length : 0;

  if (!imgs || imgs.length === 0) {
    placeholder.style.display = 'flex';
    document.getElementById('gallery-prev').classList.add('hidden');
    document.getElementById('gallery-next').classList.add('hidden');
    return;
  }

  placeholder.style.display = 'none';

  imgs.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className = 'gallery-slide' + (i > 0 ? ' hidden' : '');
    const img = document.createElement('img');
    img.src = url;
    img.alt = '';
    img.onerror = () => { slide.style.background = '#2d6a44'; img.style.display = 'none'; };
    slide.appendChild(img);
    // Insert before arrows
    wrap.insertBefore(slide, document.getElementById('gallery-prev'));

    if (imgs.length > 1) {
      const dot = document.createElement('button');
      dot.className = 'gdot' + (i === 0 ? ' active' : '');
      dot.onclick = () => irAFoto(i);
      dotsEl.appendChild(dot);
    }
  });

  const mostrarFlechas = imgs.length > 1;
  document.getElementById('gallery-prev').classList.toggle('hidden', !mostrarFlechas);
  document.getElementById('gallery-next').classList.toggle('hidden', !mostrarFlechas);
  actualizarFlechas();
}

function irAFoto(idx) {
  const slides = document.querySelectorAll('.gallery-slide');
  if (slides.length === 0) return;
  slides[fotoActual].classList.add('hidden');
  fotoActual = (idx + fotosTotal) % fotosTotal;
  slides[fotoActual].classList.remove('hidden');
  document.querySelectorAll('.gdot').forEach((d, i) => d.classList.toggle('active', i === fotoActual));
  actualizarFlechas();
}

function cambiarFoto(dir) { irAFoto(fotoActual + dir); }

function actualizarFlechas() {
  // Keep both always visible when multiple photos (circular nav)
}

/* ── Panel ── */
function abrirPanel(lugar) {
  const nivelEl = document.getElementById('panel-nivel');
  const nivelTextos = { principiante: '🟢 Principiante', intermedio: '🟡 Intermedio', avanzado: '🔴 Avanzado' };
  nivelEl.textContent = nivelTextos[lugar.nivel] || lugar.nivel;
  nivelEl.className = 'nivel-' + lugar.nivel;

  document.getElementById('panel-title').textContent = lugar.nombre;
  document.getElementById('panel-subtitle').textContent = lugar.subtitulo;
  document.getElementById('panel-desc').textContent = lugar.desc;
  document.getElementById('panel-epoca').textContent = lugar.epoca;
  document.getElementById('panel-naturaleza').textContent = lugar.naturaleza;

  document.getElementById('panel-equipo').innerHTML =
    lugar.equipo.map(e => `<span class="equipo-tag">${e}</span>`).join('');
  document.getElementById('panel-tags').innerHTML =
    lugar.tags.map(t => `<span class="ptag">${t}</span>`).join('');

  // Soporte para imgs (array) o img (string legacy)
  const imagenes = lugar.imgs || (lugar.img ? [lugar.img] : []);
  construirGaleria(imagenes);

  document.getElementById('side-panel').classList.add('open');
  map.flyTo(lugar.latlng, Math.max(map.getZoom(), 11), { duration: 0.8 });
}

function cerrarPanel() {
  document.getElementById('side-panel').classList.remove('open');
}

function volverAlInicio() {
  map.flyTo([9.82, -82.9], 9, { duration: 1 });
  cerrarPanel();
}
